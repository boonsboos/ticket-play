name: PRs should compile and pass all tests

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v5
        - name: Setup dotnet
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '10.0.x'
        - name: Run tests
          run: dotnet test
      